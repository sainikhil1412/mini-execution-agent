spring.application.name=mini-execution-agent
server.port=8080

# CSV file paths
agent.data.input-path=src/main/resources/data/products.csv
agent.data.output-path=output/products_updated.csv

# Pretty print JSON responses
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Swagger UI
springdoc.swagger-ui.path=/swagger
