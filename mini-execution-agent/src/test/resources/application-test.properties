# Test Configuration
spring.application.name=mini-execution-agent-test

# Test data paths
agent.data.input-path=src/test/resources/data/test_products.csv
agent.data.output-path=output/test_products_updated.csv

# Disable pretty print for tests (easier to assert JSON)
spring.jackson.serialization.indent-output=false

# Test logging level
logging.level.com.agent=DEBUG
logging.level.org.springframework.web=DEBUG
